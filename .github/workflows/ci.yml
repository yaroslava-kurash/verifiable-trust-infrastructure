name: CI

on:
  push:
    branches: [main, nightly]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-
            ${{ runner.os }}-cargo-

      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  msrv:
    # Verify the workspace builds against the rust-version declared in
    # the root `Cargo.toml`. CI's "stable" toolchain is usually newer
    # than the MSRV; without this job a `let-else` introduced under a
    # newer compiler can silently break consumers on the documented MSRV.
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -E '^rust-version *= *"' Cargo.toml | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"
          echo "Workspace MSRV: $msrv"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ steps.msrv.outputs.msrv }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-${{ steps.msrv.outputs.msrv }}-
            ${{ runner.os }}-cargo-

      - run: cargo check --workspace --locked

  deny:
    # cargo-deny enforces the advisory ignores documented in `deny.toml`
    # and catches new license / source / duplicate-dependency issues
    # before they land. The workspace already has a curated `deny.toml`
    # with justified ignores; this job just runs it.
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses

  release-guards:
    # Fail a PR that edits a published crate's source without bumping its
    # version. The publish workflow SKIPS any crate whose version is already
    # on crates.io, so an unbumped source edit leaves the registry holding
    # stale code — and the next crate published against it fails its
    # registry-resolved verify build. That is exactly how vti-common 0.11.2
    # and vtc-service 0.11.0 went stale and kept Publish red, while the
    # path-dep workspace build stayed green and hid it. See the script header.
    #
    # PR-only: the guard diffs against the PR base, which a push to main has
    # no meaningful equivalent of.
    name: release guards
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the guard can diff against, and read manifests
          # from, the PR's base commit.
          fetch-depth: 0
      - name: Version-bump guard for changed publishable crates
        run: bash scripts/check-version-bumps.sh "${{ github.event.pull_request.base.sha }}"

  lockfile-self-pins:
    # Sibling guard to release-guards: the version bump can be correct and the
    # release still break if Cargo.lock pins a stale crates.io copy of one of
    # our own crates (a transitive dev-dep pulls vta-sdk back in from the
    # registry). `cargo publish --locked` verifies dependents against that
    # pinned copy. See the script header.
    #
    # Its own job, and deliberately NOT PR-only. This check compares workspace
    # manifest versions against Cargo.lock — a whole-tree invariant, not a diff
    # against a base ref — so it is meaningful on a push. While it lived as a
    # step inside release-guards it inherited that job's `if: pull_request`,
    # which meant a merge could leave the lockfile stale, main stayed green,
    # and the failure surfaced on whichever unrelated PR opened next. That
    # misattribution happened twice (#706, #711).
    name: lockfile self-pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lockfile self-pin guard
        run: bash scripts/check-lockfile-self-pins.sh

  features:
    # Build the most-used non-default feature combinations so a misuse
    # of `cfg(feature = "...")` doesn't silently rot. Default-feature
    # builds are covered by the `check` job above.
    name: Feature combos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-features-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-features-
            ${{ runner.os }}-cargo-

      - name: vta-service tee + webvh
        run: cargo check -p vta-service --no-default-features --features tee,rest,didcomm
      - name: vta-service aws-secrets
        run: cargo check -p vta-service --no-default-features --features aws-secrets,keyring,rest
      - name: vta-service azure-secrets
        run: cargo check -p vta-service --no-default-features --features azure-secrets,keyring,rest
      - name: vta-service tsp transport
        run: cargo check -p vta-service --features tsp
      - name: vta-sdk attest-verify
        run: cargo check -p vta-sdk --features attest-verify
      - name: vta-sdk client + sealed-transfer + provision-integration
        run: cargo check -p vta-sdk --features client,sealed-transfer,provision-integration

  enclave:
    # The Nitro enclave binary uses a TEE-only feature combo that the
    # default `check` job never touches. Linux-only because vsock-store
    # depends on `tokio-vsock` which doesn't build on macOS/Windows.
    name: Enclave build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-enclave-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-enclave-
            ${{ runner.os }}-cargo-

      - run: cargo check -p vta-enclave --no-default-features --features rest,didcomm,vsock-store

  mobile:
    # Cross-compile vta-mobile-core for the iOS + Android targets the app repos
    # consume, and regenerate the UniFFI bindings. The host check/test/clippy
    # jobs only build for the runner's own architecture; without this job a
    # dependency or deployment-target regression that breaks the phone build
    # (e.g. the aws-lc-sys `___chkstk_darwin` iOS link failure this job's
    # deployment-target pin guards against) — or an FFI type that no longer
    # generates bindings — would land green. macOS runner because iOS needs
    # Xcode; the macOS image also ships the Android NDK.
    name: Mobile build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-
            ${{ runner.os }}-cargo-

      - name: Cross-compile (iOS + Android) and generate bindings
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}"
          ./vta-mobile-core/scripts/build-mobile.sh all
