[package]
name = "vta-sdk"
description = "SDK for Verifiable Trust Agents operating in Verifiable Trust Communities"
readme = "README.md"
version = "0.5.0"
edition.workspace = true
publish.workspace = true
authors.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
didcomm = ["dep:affinidi-tdk", "dep:affinidi-did-resolver-cache-sdk", "dep:tracing", "dep:uuid", "dep:tokio"]
client = [
  "dep:reqwest",
  "dep:tracing",
  "dep:uuid",
  "dep:affinidi-tdk",
  "dep:tokio",
  "dep:ed25519-dalek",
  "dep:x25519-dalek",
  "dep:curve25519-dalek",
  "dep:aes-gcm",
  "dep:aes",
  "dep:sha2",
]
session = [
  "client",
  "didcomm",
  "dep:affinidi-did-resolver-cache-sdk",
  "dep:tokio",
  # Rotation of a temp-provisioned did:key on first successful auth needs
  # a CSPRNG seed for the replacement Ed25519 key.
  "dep:getrandom",
]
integration = ["client", "session"]
keyring = ["dep:keyring"]
config-session = []
azure-secrets = [
  "dep:azure_security_keyvault_secrets",
  "dep:azure_identity",
  "dep:tokio",
]
sealed-transfer = [
  "dep:hpke",
  "dep:ciborium",
  "dep:getrandom",
  "dep:sha2",
  "dep:x25519-dalek",
  "dep:ed25519-dalek",
  "dep:zeroize",
  # did:key + ed25519↔x25519 conversion helpers. `affinidi-crypto::did_key`
  # gives us raw-bytes entry points (vs. the multikey-string shape in
  # `affinidi-crypto::ed25519`) that fit the HPKE key shapes directly.
  "dep:affinidi-crypto",
]
# Provision-integration: VP-framed bootstrap requests + VC-issued admin
# authorization + TemplateBootstrap payload. Pulls in `sealed-transfer` so
# everything the flow needs (HPKE, did:key helpers, ed25519↔x25519) is
# available to a single feature.
provision-integration = [
  "sealed-transfer",
  "dep:affinidi-vc",
  "dep:affinidi-data-integrity",
  "dep:affinidi-secrets-resolver",
  "dep:uuid",
  "dep:tokio",
]
# Full AWS Nitro attestation verification (COSE_Sign1 + certificate chain
# against the AWS Nitro root). Consumers of sealed-bootstrap Mode B enable
# this to validate the `Attested` producer assertion end-to-end.
attest-verify = ["dep:nitro_attest", "dep:time", "dep:affinidi-crypto"]
# Integration-side provisioning workflow: the orchestration layer above
# `provision-integration` that drives setup-key minting, transport selection,
# connection testing, and sealed-bundle opening. Used by setup tools that
# onboard an integration (mediator, webvh, future apps) against a running
# VTA. TUI-agnostic — emits events on a consumer-owned channel.
provision-client = [
  "provision-integration",
  "session",
  "dep:tracing",
]
# Expose in-memory test fixtures for downstream integration tests.
# Currently gates: `SessionBackend` mocks (always); `provision_client::test_helpers`
# (when `provision-client` is also on). Additive, zero-cost when off.
test-support = ["session"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
multibase = { workspace = true }
thiserror = { workspace = true }
affinidi-tdk = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
affinidi-did-resolver-cache-sdk = { version = "0.8", optional = true, features = ["network"] }
keyring = { version = "3", optional = true }
azure_security_keyvault_secrets = { version = "0.14", optional = true }
azure_identity = { version = "0.35", optional = true }
tokio = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, optional = true }
x25519-dalek = { workspace = true, optional = true }
curve25519-dalek = { version = "4", optional = true }
aes-gcm = { version = "0.10", optional = true }
aes = { version = "0.9", optional = true }
sha2 = { workspace = true, optional = true }
hpke = { version = "0.13", optional = true }
affinidi-crypto = { workspace = true, optional = true }
affinidi-vc = { workspace = true, optional = true }
affinidi-data-integrity = { workspace = true, optional = true }
affinidi-secrets-resolver = { workspace = true, optional = true }
ciborium = { version = "0.2", optional = true }
# Used only by sealed-transfer to feed an OS-backed CSPRNG into hpke's
# rand_core 0.9 trait surface (rand 0.10 + rand_core 0.10 are incompatible).
getrandom = { version = "0.4", optional = true }
nitro_attest = { version = "0.2", optional = true }
time = { version = "0.3", optional = true, features = ["macros"] }
# Scrub secret byte buffers on drop (sealed-transfer, key derivation).
zeroize = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"
wiremock = "0.6"
