[package]
name = "vtc-service"
description = "Service for Verifiable Trust Communities"
readme = "README.md"
version = "0.6.0"
edition.workspace = true
publish.workspace = true
authors.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["setup", "keyring"]
setup = ["dep:dialoguer", "dep:didwebvh-rs", "dep:url"]
# OS keyring backend for the VTC secret. Enables vta-sdk's keyring feature
# so the binary can register a platform store once via
# `vta_sdk::keyring_init::install_default_store()` at startup.
keyring = ["dep:keyring-core", "vta-sdk/keyring"]
config-secret = []
aws-secrets = ["dep:aws-sdk-secretsmanager", "dep:aws-config"]
gcp-secrets = [
  "dep:google-cloud-secretmanager-v1",
  "dep:google-cloud-auth",
  "dep:bytes",
]
azure-secrets = ["dep:azure_security_keyvault_secrets", "dep:azure_identity"]

[[bin]]
name = "vtc"
path = "src/main.rs"

[dependencies]
vti-common = { path = "../vti-common", version = "0.6", features = ["passkey"] }
vta-sdk = { path = "../vta-sdk", version = "0.6", features = [
  "didcomm",
  "session",
  "config-session",
] }
affinidi-tdk = { workspace = true }
affinidi-messaging-didcomm-service = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }
affinidi-did-resolver-cache-sdk = { workspace = true }
base64 = { workspace = true }
axum = { workspace = true }
axum-extra = { workspace = true }
jsonwebtoken = { workspace = true }
fjall = { workspace = true }
toml = { workspace = true }
tower-http = { workspace = true, features = ["cors", "trace"] }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
ed25519-dalek = { workspace = true }
hex = { workspace = true }
keyring-core = { workspace = true, optional = true }
aws-sdk-secretsmanager = { version = "1", optional = true }
aws-config = { version = "1", features = [
  "behavior-version-latest",
], optional = true }
google-cloud-secretmanager-v1 = { version = "1", optional = true }
google-cloud-auth = { version = "1", optional = true }
bytes = { version = "1", optional = true }
uuid = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
didwebvh-rs = { workspace = true, optional = true }
rand = { workspace = true }
dialoguer = { workspace = true, optional = true }
azure_security_keyvault_secrets = { workspace = true, optional = true }
azure_identity = { workspace = true, optional = true }
sha2 = { workspace = true }
hkdf = { workspace = true }
x25519-dalek = { workspace = true }
zeroize = { version = "1", features = ["derive"] }
multibase = { workspace = true }
url = { workspace = true, optional = true }
# WebAuthn — used by `crate::webauthn` for Ed25519-only registration
# wrappers (M0.5.1). The protocol crate is a direct dep so we can
# reference `PubKeyCredParams` and `COSEAlgorithm` without funnelling
# them through `webauthn-rs::prelude` (which re-exports them but
# also surfaces ~300 unrelated symbols).
webauthn-rs = { workspace = true }
webauthn-rs-proto = "0.5"

[dev-dependencies]
tempfile = "3"
# Integration tests under `tests/` exercise the route stack via
# `Router::oneshot` — same pattern as `vta-service/tests/api_integration.rs`.
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
# CBOR encoding for the soft Ed25519 authenticator harness
# (`tests/common/webauthn_harness.rs`). Produces the CTAP attestation
# object + COSE public key on the same wire shape `webauthn-rs-core`
# parses (it uses `serde_cbor_2` internally — `ciborium` is canonical
# enough for both to agree).
ciborium = "0.2"

[lints]
workspace = true
